<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>OW Field Sales</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:monospace;background:#111827;color:#f9fafb;height:100vh;display:flex;flex-direction:column;overflow:hidden}
button{font-family:monospace;cursor:pointer}
input,select,textarea{font-family:monospace}
#map{flex:1;z-index:1}
.hdr{background:#1f2937;border-bottom:2px solid #374151;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;z-index:1000;position:relative;flex-shrink:0}
.statbar{background:#1a2332;border-bottom:1px solid #374151;padding:6px 14px;display:flex;gap:12px;align-items:center;overflow-x:auto;z-index:1000;position:relative;flex-shrink:0}
.sheet{position:fixed;bottom:0;left:0;right:0;background:#1f2937;border-top:2px solid #2563eb;border-radius:16px 16px 0 0;padding:18px 16px 30px;z-index:2000;animation:up .22s ease;max-height:90vh;overflow-y:auto}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:9px;height:9px;border:2px solid #60a5fa;border-top-color:transparent;border-radius:50%;display:inline-block;animation:spin .7s linear infinite;vertical-align:middle}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1999}
.inp{width:100%;background:#111827;border:1px solid #374151;border-radius:8px;color:#f9fafb;font-size:13px;padding:10px;outline:none;font-family:monospace;margin-top:4px}
.lbl{font-size:9px;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em;margin-top:12px;display:block}
.navbtn{padding:5px 9px;border-radius:6px;border:none;font-size:11px;font-weight:700}
.route-stop{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #374151;cursor:pointer;}
.stop-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;flex-shrink:0}
/* Map controls */
.map-ctrl{position:absolute;z-index:500;background:#1f2937;border:1px solid #374151;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.4)}
</style>
</head>
<body>
<div class="hdr">
  <div style="display:flex;align-items:center;gap:8px;">
    <div style="width:30px;height:30px;background:#2563eb;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;color:white;flex-shrink:0;">OW</div>
    <div>
      <div style="font-size:13px;font-weight:700;">OPTIMUM WATER</div>
      <div style="font-size:8px;color:#9ca3af;letter-spacing:.1em;">FIELD SALES TRACKER</div>
    </div>
  </div>
  <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;">
    <button id="gpsBtn" onclick="toggleGps()" class="navbtn" style="background:#374151;color:#9ca3af;">GPS</button>
    <button onclick="showRoutePicker()" class="navbtn" style="background:#7c3aed;color:white;">&#128205; Route</button>
    <button onclick="searchNearby()" class="navbtn" style="background:#374151;color:#9ca3af;">Nearby</button>
    <button onclick="showList()" class="navbtn" style="background:#374151;color:#9ca3af;">List</button>
    <button onclick="openAdd()" class="navbtn" style="background:#2563eb;color:white;">+ Add</button>
  </div>
</div>
<div class="statbar">
  <div style="display:flex;align-items:baseline;gap:4px;white-space:nowrap;"><span style="font-size:9px;color:#6b7280;text-transform:uppercase;">Leads</span><span id="st-total" style="font-size:17px;font-weight:900;color:#9ca3af;">0</span></div>
  <div style="display:flex;align-items:baseline;gap:4px;white-space:nowrap;"><span style="font-size:9px;color:#6b7280;text-transform:uppercase;">Visited</span><span id="st-visited" style="font-size:17px;font-weight:900;color:#60a5fa;">0</span></div>
  <div style="display:flex;align-items:baseline;gap:4px;white-space:nowrap;"><span style="font-size:9px;color:#6b7280;text-transform:uppercase;">Sales</span><span id="st-sales" style="font-size:17px;font-weight:900;color:#4ade80;">0</span></div>
  <div style="display:flex;align-items:baseline;gap:4px;white-space:nowrap;"><span style="font-size:9px;color:#6b7280;text-transform:uppercase;">Conv</span><span id="st-conv" style="font-size:17px;font-weight:900;color:#fbbf24;">0%</span></div>
  <div id="route-badge" style="display:none;margin-left:4px;background:#7c3aed;border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700;color:white;white-space:nowrap;cursor:pointer;" onclick="showRoutePanel(currentRoute)">&#128205; ROUTE ON</div>
  <button onclick="doReset()" style="margin-left:auto;padding:5px 9px;background:transparent;border:1px solid #374151;border-radius:6px;color:#6b7280;font-size:11px;flex-shrink:0;">Reset</button>
</div>
<div style="position:relative;flex:1;display:flex;flex-direction:column;">
  <div id="map" style="flex:1;"></div>
  <!-- Custom map controls -->
  <div id="ctrl-center" class="map-ctrl" style="bottom:120px;right:12px;width:40px;height:40px;" onclick="centerOnMe()" title="Center on my location">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" fill="#60a5fa"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="8" stroke="#60a5fa" stroke-width="1.5" fill="none"/></svg>
  </div>
  <div id="ctrl-north" class="map-ctrl" style="bottom:168px;right:12px;width:40px;height:40px;" onclick="resetNorth()" title="Reset to North">
    <svg width="20" height="20" viewBox="0 0 24 24"><text x="12" y="17" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#f87171">N</text></svg>
  </div>
  <div id="ctrl-tracking" class="map-ctrl" style="bottom:216px;right:12px;width:40px;height:40px;background:#1e3a5f;" onclick="toggleTracking()" title="Toggle driving mode" id="trackBtn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M5 17H3a2 2 0 01-2-2V9a2 2 0 012-2h14l4 4v4a2 2 0 01-2 2h-2M5 17a2 2 0 100 4 2 2 0 000-4zM17 17a2 2 0 100 4 2 2 0 000-4z" stroke="#60a5fa" stroke-width="1.5"/></svg>
  </div>
  <!-- Next stop banner (shown when route active) -->
  <div id="next-stop-banner" style="display:none;position:absolute;top:10px;left:10px;right:60px;background:rgba(124,58,237,.95);border-radius:10px;padding:10px 12px;cursor:pointer;backdrop-filter:blur(4px);" onclick="goNextStop()">
    <div style="font-size:9px;color:#c084fc;text-transform:uppercase;letter-spacing:.1em;">NEXT STOP</div>
    <div id="next-stop-name" style="font-size:14px;font-weight:700;color:white;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></div>
    <div id="next-stop-info" style="font-size:10px;color:#c084fc;margin-top:1px;"></div>
  </div>
</div>
<div id="panel"></div>

<script>
var CFG={pending:{label:"Not Visited",color:"#6b7280",bg:"#374151",dot:"#9ca3af"},checked_in:{label:"Checked In",color:"#60a5fa",bg:"#1e3a5f",dot:"#3b82f6"},not_interested:{label:"Not Interested",color:"#f87171",bg:"#450a0a",dot:"#ef4444"},sale:{label:"SALE!",color:"#4ade80",bg:"#052e16",dot:"#16a34a"},callback:{label:"Call Back",color:"#fbbf24",bg:"#451a03",dot:"#f59e0b"},no_answer:{label:"No Answer",color:"#c084fc",bg:"#2e1065",dot:"#a855f7"}};
var BTYPES=["Restaurant","Medical","Laundry","Spa/Wellness","Auto","Bakery","Retail","Office","Gym","Hotel","Other"];
var TYPE_MAP={"restaurant":"Restaurant","food":"Restaurant","meal_takeaway":"Restaurant","cafe":"Restaurant","doctor":"Medical","dentist":"Medical","hospital":"Medical","physiotherapist":"Medical","pharmacy":"Medical","laundry":"Laundry","car_wash":"Auto","car_dealer":"Auto","car_repair":"Auto","bakery":"Bakery","beauty_salon":"Spa/Wellness","spa":"Spa/Wellness","gym":"Gym","lodging":"Hotel"};

var leads=[];
try{var sv=localStorage.getItem("ow11");if(sv)leads=JSON.parse(sv);}catch(e){}
function save(){try{localStorage.setItem("ow11",JSON.stringify(leads));}catch(e){}}
function hav(a,b,c,d){var R=6371,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180,p=Math.sin(x/2)*Math.sin(x/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)*Math.sin(y/2);return R*2*Math.atan2(Math.sqrt(p),Math.sqrt(1-p));}
function fmt(k){return k<1?Math.round(k*1000)+"m":k.toFixed(1)+"km";}

var gmap,gpsMarker,watchId,myPos=null,myHeading=null,gpsOn=false,trackingMode=false;
var markers={},currentRoute=[],routeActive=false,currentStopIdx=0;
var placesService,directionsService,directionsRenderer;

// Car SVG icon facing direction
function carIcon(heading){
  var h=heading||0;
  var svg='<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36"><g transform="rotate('+h+',18,18)"><rect x="10" y="8" width="16" height="22" rx="4" fill="#2563eb" stroke="white" stroke-width="2"/><rect x="12" y="10" width="12" height="8" rx="2" fill="#93c5fd" opacity="0.8"/><rect x="10" y="26" width="5" height="4" rx="2" fill="#1e3a5f"/><rect x="21" y="26" width="5" height="4" rx="2" fill="#1e3a5f"/><rect x="10" y="8" width="5" height="4" rx="2" fill="#1e3a5f"/><rect x="21" y="8" width="5" height="4" rx="2" fill="#1e3a5f"/><circle cx="18" cy="30" r="2" fill="#fbbf24"/></g></svg>';
  return {url:"data:image/svg+xml;charset=UTF-8,"+encodeURIComponent(svg),scaledSize:new google.maps.Size(36,36),anchor:new google.maps.Point(18,18)};
}

function numIcon(num,color,done){
  var bg=done?"#374151":color;
  var svg='<svg xmlns="http://www.w3.org/2000/svg" width="34" height="40" viewBox="0 0 34 40"><path d="M17 2C9.8 2 4 7.8 4 15c0 10 13 23 13 23s13-13 13-23C30 7.8 24.2 2 17 2z" fill="'+bg+'" stroke="white" stroke-width="2"/><text x="17" y="20" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="white">'+num+"</text></svg>";
  return {url:"data:image/svg+xml;charset=UTF-8,"+encodeURIComponent(svg),scaledSize:new google.maps.Size(34,40),anchor:new google.maps.Point(17,38)};
}

function dotIcon(color){
  return {path:google.maps.SymbolPath.CIRCLE,fillColor:color,fillOpacity:1,strokeColor:"white",strokeWeight:2,scale:7};
}

function initMap(){
  gmap=new google.maps.Map(document.getElementById("map"),{
    center:{lat:43.8361,lng:-79.4983},zoom:14,
    clickableIcons:true,
    disableDefaultUI:true,
    gestureHandling:"greedy",
    styles:[{elementType:"geometry",stylers:[{color:"#1d2c4d"}]},{elementType:"labels.text.fill",stylers:[{color:"#8ec3b9"}]},{elementType:"labels.text.stroke",stylers:[{color:"#1a3646"}]},{featureType:"road",elementType:"geometry",stylers:[{color:"#304a7d"}]},{featureType:"road",elementType:"labels.text.fill",stylers:[{color:"#98a5be"}]},{featureType:"water",elementType:"geometry",stylers:[{color:"#0e1626"}]},{featureType:"poi",elementType:"geometry",stylers:[{color:"#283d6a"}]},{featureType:"transit",elementType:"geometry",stylers:[{color:"#2f3948"}]}]
  });
  placesService=new google.maps.places.PlacesService(gmap);
  directionsService=new google.maps.DirectionsService();
  directionsRenderer=new google.maps.DirectionsRenderer({suppressMarkers:true,polylineOptions:{strokeColor:"#7c3aed",strokeWeight:5,strokeOpacity:.85}});
  directionsRenderer.setMap(gmap);

  gmap.addListener("click",function(e){
    if(e.placeId){
      e.stop();
      placesService.getDetails({placeId:e.placeId,fields:["name","vicinity","geometry","types","rating"]},function(place,status){
        if(status!=google.maps.places.PlacesServiceStatus.OK)return;
        var existing=leads.find(function(l){return l.id==e.placeId;});
        if(existing){showLead(existing.id);return;}
        var t="Other";
        if(place.types)place.types.forEach(function(pt){if(TYPE_MAP[pt]&&t=="Other")t=TYPE_MAP[pt];});
        var sn=place.name.replace(/['"\\]/g,""),sa=(place.vicinity||"").replace(/['"\\]/g,"");
        var lat=place.geometry.location.lat(),lng=place.geometry.location.lng();
        var h='<div class="overlay" onclick="closePanel()"></div><div class="sheet">';
        h+='<div style="font-size:18px;font-weight:700;margin-bottom:4px;">'+place.name+"</div>";
        h+='<div style="font-size:10px;color:#9ca3af;">'+(place.vicinity||"")+" &middot; "+t+"</div>";
        if(place.rating)h+='<div style="font-size:11px;color:#fbbf24;margin-top:4px;">&#9733; '+place.rating+" &middot; Google verified</div>";
        h+='<div style="display:flex;gap:8px;margin-top:16px;">';
        h+='<button onclick="addAndCheckIn(\''+e.placeId+'\',\''+sn+'\',\''+sa+'\',\''+t+'\','+lat+','+lng+')" style="flex:1;padding:13px;background:#2563eb;border:none;border-radius:9px;color:white;font-weight:800;font-size:13px;">CHECK IN NOW</button>';
        h+='<button onclick="addToRoute(\''+e.placeId+'\',\''+sn+'\',\''+sa+'\',\''+t+'\','+lat+','+lng+')" style="padding:13px 14px;background:#374151;border:none;border-radius:9px;color:#9ca3af;font-size:12px;">+ Save</button>';
        h+='<button onclick="closePanel()" style="padding:13px 14px;background:#374151;border:none;border-radius:9px;color:#9ca3af;font-size:16px;">X</button>';
        h+="</div></div>";
        document.getElementById("panel").innerHTML=h;
      });
    }
  });
  refreshMarkers();
}

function addMarker(lead,routeIdx){
  if(markers[lead.id])markers[lead.id].setMap(null);
  var colors={pending:"#9ca3af",checked_in:"#3b82f6",not_interested:"#ef4444",sale:"#16a34a",callback:"#f59e0b",no_answer:"#a855f7"};
  var c=colors[lead.status]||"#9ca3af";
  var icon=routeIdx!=null?numIcon(routeIdx+1,c,lead.status!="pending"&&lead.status!="checked_in"):dotIcon(c);
  var m=new google.maps.Marker({position:{lat:lead.lat,lng:lead.lng},map:gmap,icon:icon,title:lead.name,zIndex:routeIdx!=null?200:lead.status=="sale"?100:1});
  m.addListener("click",function(){showLead(lead.id);});
  markers[lead.id]=m;
}

function refreshMarkers(){
  leads.forEach(function(l){
    var idx=currentRoute.findIndex(function(r){return r.id==l.id;});
    addMarker(l,idx>=0?idx:null);
  });
  updateStats();
}

function updateStats(){
  var v=leads.filter(function(l){return l.status!="pending";}).length;
  var s=leads.filter(function(l){return l.status=="sale";}).length;
  document.getElementById("st-total").textContent=leads.length;
  document.getElementById("st-visited").textContent=v;
  document.getElementById("st-sales").textContent=s;
  document.getElementById("st-conv").textContent=(v>0?Math.round(s/v*100):0)+"%";
}

function updateNextStopBanner(){
  if(!routeActive||currentRoute.length==0){document.getElementById("next-stop-banner").style.display="none";return;}
  var remaining=currentRoute.filter(function(r){var l=leads.find(function(x){return x.id==r.id;});return l&&l.status=="pending";});
  if(!remaining.length){document.getElementById("next-stop-banner").style.display="none";return;}
  var next=remaining[0];
  var dist=myPos?hav(myPos.lat,myPos.lng,next.lat,next.lng):null;
  var idx=currentRoute.findIndex(function(r){return r.id==next.id;});
  document.getElementById("next-stop-banner").style.display="block";
  document.getElementById("next-stop-name").textContent=next.name;
  document.getElementById("next-stop-info").textContent="Stop "+(idx+1)+" of "+currentRoute.length+(dist?" &middot; "+fmt(dist)+" away":"");
  window._nextStopId=next.id;
}

function goNextStop(){if(window._nextStopId)showLead(window._nextStopId);}

// GPS + heading tracking
function toggleGps(){
  if(gpsOn){
    if(watchId)navigator.geolocation.clearWatch(watchId);
    if(gpsMarker)gpsMarker.setMap(null);
    gpsMarker=null;myPos=null;myHeading=null;gpsOn=false;trackingMode=false;
    document.getElementById("gpsBtn").style.background="#374151";
    document.getElementById("gpsBtn").style.color="#9ca3af";
    document.getElementById("gpsBtn").textContent="GPS";
    document.getElementById("ctrl-tracking").style.background="#1f2937";
    updateNextStopBanner();
  } else {
    if(!navigator.geolocation){alert("GPS not available");return;}
    document.getElementById("gpsBtn").innerHTML='<span class="spinner"></span> Locating...';
    watchId=navigator.geolocation.watchPosition(function(pos){
      var prev=myPos;
      myPos={lat:pos.coords.latitude,lng:pos.coords.longitude};
      if(pos.coords.heading!=null&&!isNaN(pos.coords.heading))myHeading=pos.coords.heading;
      else if(prev&&myPos){
        var dlng=myPos.lng-prev.lng,dlat=myPos.lat-prev.lat;
        if(Math.abs(dlng)>0.00001||Math.abs(dlat)>0.00001)myHeading=Math.atan2(dlng,dlat)*180/Math.PI;
      }
      if(!gpsOn){
        gpsOn=true;
        document.getElementById("gpsBtn").style.background="#2563eb";
        document.getElementById("gpsBtn").style.color="white";
        document.getElementById("gpsBtn").textContent="GPS ON";
        gmap.setCenter(myPos);gmap.setZoom(15);
      }
      if(!gpsMarker){
        gpsMarker=new google.maps.Marker({position:myPos,map:gmap,icon:carIcon(myHeading),title:"You",zIndex:1000});
      } else {
        gpsMarker.setPosition(myPos);
        gpsMarker.setIcon(carIcon(myHeading));
      }
      if(trackingMode){
        gmap.setCenter(myPos);
        if(myHeading!=null)gmap.setHeading(myHeading);
      }
      updateNextStopBanner();
    },function(e){
      document.getElementById("gpsBtn").textContent="GPS";
      alert(e.code==1?"Location permission denied.":"GPS error.");
    },{enableHighAccuracy:true,maximumAge:2000,timeout:15000});
  }
}

function toggleTracking(){
  if(!myPos){alert("Turn on GPS first.");return;}
  trackingMode=!trackingMode;
  document.getElementById("ctrl-tracking").style.background=trackingMode?"#7c3aed":"#1f2937";
  if(trackingMode){gmap.setCenter(myPos);gmap.setZoom(17);if(myHeading!=null)gmap.setHeading(myHeading);gmap.setTilt(45);}
  else{gmap.setTilt(0);gmap.setHeading(0);}
}

function centerOnMe(){
  if(!myPos){alert("Turn on GPS first.");return;}
  gmap.setCenter(myPos);gmap.setZoom(15);gmap.setTilt(0);gmap.setHeading(0);
}

function resetNorth(){gmap.setHeading(0);gmap.setTilt(0);}

// ROUTE BUILDER
function showRoutePicker(){
  if(!myPos){alert("Turn on GPS first!");return;}
  var h='<div class="overlay" onclick="closePanel()"></div><div class="sheet">';
  h+='<div style="font-size:17px;font-weight:700;margin-bottom:6px;">&#128205; Build Route</div>';
  h+='<div style="font-size:11px;color:#9ca3af;margin-bottom:18px;">Choose how many stops to plan around you</div>';
  h+='<div style="display:flex;flex-direction:column;gap:10px;">';
  h+='<button onclick="buildRoute(5)" style="padding:16px;background:#1e3a5f;border:2px solid #3b82f6;border-radius:10px;color:white;font-size:14px;font-weight:700;text-align:left;"><div>&#9889; Quick - 5 Stops</div><div style="font-size:10px;color:#93c5fd;margin-top:3px;">Fast load &middot; nearby only</div></button>';
  h+='<button onclick="buildRoute(10)" style="padding:16px;background:#1c1a00;border:2px solid #f59e0b;border-radius:10px;color:white;font-size:14px;font-weight:700;text-align:left;"><div>&#128336; Standard - 10 Stops</div><div style="font-size:10px;color:#fcd34d;margin-top:3px;">Balanced &middot; wider area</div></button>';
  h+='<button onclick="buildRoute(15)" style="padding:16px;background:#052e16;border:2px solid #16a34a;border-radius:10px;color:white;font-size:14px;font-weight:700;text-align:left;"><div>&#128200; Full Day - 15 Stops</div><div style="font-size:10px;color:#86efac;margin-top:3px;">Max coverage &middot; larger radius</div></button>';
  h+="</div></div>";
  document.getElementById("panel").innerHTML=h;
}
function buildRoute(maxStops){
  if(!myPos){alert("Turn on GPS first so I know where you are!");return;}
  closePanel();
  document.getElementById("panel").innerHTML='<div class="overlay"></div><div class="sheet"><div style="text-align:center;padding:30px 20px;"><div class="spinner" style="width:32px;height:32px;border-width:3px;display:inline-block;"></div><div style="font-size:16px;font-weight:700;margin-top:16px;color:white;">Building Your Route</div><div style="font-size:11px;color:#9ca3af;margin-top:8px;">Finding 30 businesses near you<br>and optimizing driving order...</div></div></div>';
  var types=[["restaurant"],["health"],["laundry"],["car_wash"],["bakery"],["spa"],["car_dealer"],["pharmacy"]];
  var collected=[],done=0;
  function search(typeArr){
    placesService.nearbySearch({location:new google.maps.LatLng(myPos.lat,myPos.lng),radius:5000,type:typeArr},function(results,status){
      done++;
      if(status==google.maps.places.PlacesServiceStatus.OK&&results){
        results.forEach(function(place){
          if(!place.name||collected.find(function(c){return c.id==place.place_id;}))return;
          var existing=leads.find(function(l){return l.id==place.place_id&&l.status!="pending";});
          if(existing)return;
          var t="Other";
          if(place.types)place.types.forEach(function(pt){if(TYPE_MAP[pt]&&t=="Other")t=TYPE_MAP[pt];});
          collected.push({id:place.place_id,name:place.name,address:place.vicinity||"",type:t,lat:place.geometry.location.lat(),lng:place.geometry.location.lng(),rating:place.rating||0});
        });
      }
      if(done==types.length){
        var pool=collected.map(function(b){return Object.assign({},b,{dist:hav(myPos.lat,myPos.lng,b.lat,b.lng)});}).sort(function(a,b){return a.dist-b.dist;}).slice(0,60);
        var route=[],cur={lat:myPos.lat,lng:myPos.lng};
        while(route.length<maxStops&&pool.length>0){
          var best=0,bd=9999;
          pool.forEach(function(b,i){var d=hav(cur.lat,cur.lng,b.lat,b.lng);if(d<bd){bd=d;best=i;}});
          var picked=pool.splice(best,1)[0];
          route.push(picked);cur={lat:picked.lat,lng:picked.lng};
        }
        applyRoute(route);
      }
    });
  }
  types.forEach(search);
}

function applyRoute(route){
  route.forEach(function(b){
    if(!leads.find(function(l){return l.id==b.id;})){
      leads.push({id:b.id,name:b.name,address:b.address,type:b.type,lat:b.lat,lng:b.lng,rating:b.rating,status:"pending",checkInTime:null,checkOutTime:null,notes:"",checkedInAt:null});
    }
  });
  save();
  currentRoute=route;routeActive=true;currentStopIdx=0;
  document.getElementById("route-badge").style.display="block";
  refreshMarkers();
  // Draw route
  if(route.length>=2){
    var wps=route.slice(1,route.length-1).slice(0,23).map(function(b){return{location:new google.maps.LatLng(b.lat,b.lng),stopover:true};});
    directionsService.route({origin:new google.maps.LatLng(myPos.lat,myPos.lng),destination:new google.maps.LatLng(route[route.length-1].lat,route[route.length-1].lng),waypoints:wps,optimizeWaypoints:false,travelMode:google.maps.TravelMode.DRIVING},function(result,status){
      if(status==google.maps.DirectionsStatus.OK)directionsRenderer.setDirections(result);
    });
  }
  updateNextStopBanner();
  showRoutePanel(route);
}

function showRoutePanel(route){
  var h='<div class="overlay" onclick="closePanel()"></div><div class="sheet">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">';
  h+='<div><div style="font-size:17px;font-weight:700;">&#128205; Your Route</div><div style="font-size:10px;color:#9ca3af;">'+route.length+" stops &middot; optimized driving order</div></div>";
  h+='<div style="display:flex;gap:6px;"><button onclick="clearRoute()" style="padding:6px 10px;background:#450a0a;border:none;border-radius:6px;color:#f87171;font-size:10px;font-weight:700;">Clear</button><button onclick="closePanel()" style="padding:6px 10px;background:#374151;border:none;border-radius:6px;color:#9ca3af;font-size:13px;">X</button></div></div>';
  route.forEach(function(b,i){
    var lead=leads.find(function(l){return l.id==b.id;});
    var status=lead?lead.status:"pending";
    var cfg=CFG[status];
    var dist=myPos?hav(myPos.lat,myPos.lng,b.lat,b.lng):null;
    var done=status!="pending"&&status!="checked_in";
    h+='<div class="route-stop" onclick="closePanel();showLead(\''+b.id+'\')" style="opacity:'+(done?".5":"1")+'">';
    h+='<div class="stop-num" style="background:'+cfg.dot+';color:white;">'+(done?"&#10003;":i+1)+"</div>";
    h+='<div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;'+(done?"text-decoration:line-through;color:#6b7280;":"")+'">'+b.name+"</div>";
    h+='<div style="font-size:9px;color:#9ca3af;">'+b.address+"</div>";
    if(dist!=null)h+='<div style="font-size:9px;color:#f59e0b;">'+fmt(dist)+" away</div>";
    h+="</div>";
    h+='<div style="background:'+cfg.bg+';border-radius:20px;padding:2px 7px;flex-shrink:0;"><span style="font-size:8px;font-weight:700;color:'+cfg.color+';">'+cfg.label+"</span></div></div>";
  });
  var remaining=route.filter(function(r){var l=leads.find(function(x){return x.id==r.id;});return l&&l.status=="pending";}).length;
  h+='<div style="text-align:center;padding:10px;font-size:10px;color:#6b7280;">'+remaining+" stops remaining</div>";
  h+="</div>";
  document.getElementById("panel").innerHTML=h;
}

function clearRoute(){
  directionsRenderer.setDirections({routes:[]});
  currentRoute=[];routeActive=false;
  document.getElementById("route-badge").style.display="none";
  document.getElementById("next-stop-banner").style.display="none";
  refreshMarkers();closePanel();
}

function searchNearby(){
  var center=myPos||{lat:43.8361,lng:-79.4983};
  var types=[["restaurant"],["health"],["laundry"],["car_wash"],["bakery"],["spa"],["gym"],["car_dealer"]];
  var total=0,done=0;
  document.getElementById("panel").innerHTML='<div class="overlay"></div><div class="sheet"><div style="text-align:center;padding:24px;"><div class="spinner" style="width:24px;height:24px;border-width:3px;display:inline-block;"></div><div style="font-size:14px;margin-top:12px;color:white;">Loading nearby businesses...</div></div></div>';
  types.forEach(function(typeArr){
    placesService.nearbySearch({location:new google.maps.LatLng(center.lat,center.lng),radius:20000,type:typeArr},function(results,status){
      done++;
      if(status==google.maps.places.PlacesServiceStatus.OK&&results){
        results.forEach(function(place){
          if(!place.name||leads.find(function(l){return l.id==place.place_id;}))return;
          var t="Other";
          if(place.types)place.types.forEach(function(pt){if(TYPE_MAP[pt]&&t=="Other")t=TYPE_MAP[pt];});
          leads.push({id:place.place_id,name:place.name,address:place.vicinity||"",type:t,lat:place.geometry.location.lat(),lng:place.geometry.location.lng(),rating:place.rating,status:"pending",checkInTime:null,checkOutTime:null,notes:"",checkedInAt:null});
          total++;
        });
      }
      if(done==types.length){save();refreshMarkers();closePanel();alert("Added "+total+" businesses! Tap Route to create a driving route.");}
    });
  });
}

function showLead(id){
  var lead=leads.find(function(l){return l.id==id;});
  if(!lead)return;
  var cfg=CFG[lead.status];
  var dist=myPos?hav(myPos.lat,myPos.lng,lead.lat,lead.lng):null;
  var routeIdx=currentRoute.findIndex(function(r){return r.id==id;});
  var h='<div class="overlay" onclick="closePanel()"></div><div class="sheet">';
  if(routeIdx>=0)h+='<div style="background:#7c3aed;border-radius:6px;padding:4px 10px;font-size:10px;font-weight:700;color:white;display:inline-block;margin-bottom:10px;">&#128205; STOP '+(routeIdx+1)+" OF "+currentRoute.length+"</div>";
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">';
  h+='<div style="flex:1;min-width:0;"><div style="font-size:18px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+lead.name+"</div>";
  h+='<div style="font-size:10px;color:#9ca3af;margin-top:2px;">'+lead.address+(lead.type?" &middot; "+lead.type:"")+"</div>";
  if(lead.rating)h+='<div style="font-size:11px;color:#fbbf24;margin-top:3px;">&#9733; '+lead.rating+"</div>";
  if(dist!=null)h+='<div style="font-size:12px;color:#f59e0b;margin-top:3px;font-weight:700;">'+fmt(dist)+" away</div>";
  if(lead.checkInTime)h+='<div style="font-size:9px;color:#6b7280;margin-top:3px;">In: '+lead.checkInTime+(lead.checkOutTime?" &middot; Out: "+lead.checkOutTime:"")+"</div>";
  h+="</div>";
  h+='<div style="background:'+cfg.bg+';border-radius:20px;padding:4px 10px;display:flex;align-items:center;gap:4px;margin-left:10px;flex-shrink:0;">';
  h+='<span style="width:7px;height:7px;border-radius:50%;background:'+cfg.dot+';display:inline-block;"></span>';
  h+='<span style="font-size:10px;font-weight:700;color:'+cfg.color+';">'+cfg.label+"</span></div></div>";
  if(lead.notes)h+='<div style="font-size:11px;color:#9ca3af;margin-bottom:12px;font-style:italic;padding:8px;background:#111827;border-radius:6px;">'+lead.notes+"</div>";
  h+='<div style="display:flex;gap:8px;flex-wrap:wrap;">';
  if(lead.status=="pending")h+='<button onclick="openIn(\''+id+'\')" style="flex:1;min-width:100px;padding:13px;background:#2563eb;border:none;border-radius:9px;color:white;font-weight:900;font-size:14px;">CHECK IN</button>';
  if(lead.status=="checked_in")h+='<button onclick="openOut(\''+id+'\')" style="flex:1;min-width:100px;padding:13px;background:#d97706;border:none;border-radius:9px;color:black;font-weight:900;font-size:14px;">CHECK OUT</button>';
  if(["not_interested","no_answer","callback","sale"].indexOf(lead.status)>=0)h+='<button onclick="reopenLead(\''+id+'\')" style="flex:1;min-width:80px;padding:13px;background:#374151;border:none;border-radius:9px;color:#9ca3af;font-size:12px;">Re-visit</button>';
  if(routeIdx>=0&&routeIdx<currentRoute.length-1){
    var nextStop=currentRoute[routeIdx+1];
    h+='<button onclick="closePanel();showLead(\''+nextStop.id+'\')" style="flex:1;min-width:80px;padding:13px;background:#7c3aed;border:none;border-radius:9px;color:white;font-size:12px;font-weight:700;">Next &#8594;</button>';
  }
  h+='<button onclick="deleteLead(\''+id+'\')" style="padding:13px;background:#450a0a;border:none;border-radius:9px;color:#f87171;font-size:13px;">&#128465;</button>';
  h+='<button onclick="closePanel()" style="padding:13px;background:#374151;border:none;border-radius:9px;color:#9ca3af;font-size:16px;">X</button>';
  h+="</div>";
  if(routeActive)h+='<button onclick="showRoutePanel(currentRoute)" style="width:100%;padding:10px;background:#2e1065;border:none;border-radius:8px;color:#c084fc;font-size:12px;font-weight:700;margin-top:10px;">&#128205; View Full Route</button>';
  h+="</div>";
  document.getElementById("panel").innerHTML=h;
  if(gmap)gmap.panTo({lat:lead.lat,lng:lead.lng});
}

function openIn(id){
  var lead=leads.find(function(l){return l.id==id;});
  if(!lead)return;
  var h='<div class="overlay"></div><div class="sheet">';
  h+='<div style="font-size:9px;color:#9ca3af;text-transform:uppercase;letter-spacing:.1em;">CHECKING IN AT</div>';
  h+='<div style="font-size:19px;font-weight:700;margin:6px 0 3px;">'+lead.name+"</div>";
  h+='<div style="font-size:10px;color:#9ca3af;margin-bottom:4px;">'+lead.address+"</div>";
  h+='<span class="lbl">NOTES (optional)</span>';
  h+='<textarea id="mn" class="inp" placeholder="Owner present, showed interest in taste test..." style="resize:none;height:80px;margin-top:4px;"></textarea>';
  h+='<div style="display:flex;gap:8px;margin-top:14px;">';
  h+='<button onclick="confirmIn(\''+id+'\')" style="flex:1;padding:14px;background:#2563eb;border:none;border-radius:10px;color:white;font-weight:900;font-size:14px;">CONFIRM CHECK IN</button>';
  h+='<button onclick="showLead(\''+id+'\')" style="padding:14px 16px;background:#374151;border:none;border-radius:10px;color:#9ca3af;font-size:16px;">X</button>';
  h+="</div></div>";
  document.getElementById("panel").innerHTML=h;
}

function confirmIn(id){
  var n=document.getElementById("mn")?document.getElementById("mn").value:"";
  leads=leads.map(function(l){return l.id==id?Object.assign({},l,{status:"checked_in",checkInTime:new Date().toLocaleTimeString(),checkedInAt:Date.now(),notes:n}):l;});
  save();
  var lead=leads.find(function(l){return l.id==id;});
  var idx=currentRoute.findIndex(function(r){return r.id==id;});
  addMarker(lead,idx>=0?idx:null);
  updateStats();updateNextStopBanner();closePanel();
}

function openOut(id){
  var lead=leads.find(function(l){return l.id==id;});
  if(!lead)return;
  window._coStatus="not_interested";
  function render(){
    var h='<div class="overlay"></div><div class="sheet">';
    h+='<div style="font-size:9px;color:#9ca3af;text-transform:uppercase;letter-spacing:.1em;">CHECKING OUT OF</div>';
    h+='<div style="font-size:19px;font-weight:700;margin:6px 0 3px;">'+lead.name+"</div>";
    h+='<div style="font-size:10px;color:#9ca3af;margin-bottom:12px;">'+lead.address+"</div>";
    h+='<span class="lbl">OUTCOME</span>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;">';
    ["sale","not_interested","callback","no_answer"].forEach(function(s){
      var c=CFG[s],sel=window._coStatus==s;
      h+='<button onclick="window._coStatus=\''+s+'\';window._ro()" style="padding:13px 7px;border-radius:9px;font-size:12px;font-weight:700;border:2px solid '+(sel?c.dot:"#374151")+';background:'+(sel?c.bg:"#111827")+';color:'+(sel?c.color:"#6b7280")+';">'+c.label+"</button>";
    });
    h+="</div>";
    h+='<span class="lbl">NOTES</span>';
    h+='<textarea id="mn" class="inp" placeholder="Left brochure, will follow up..." style="resize:none;height:70px;margin-top:4px;">'+lead.notes+"</textarea>";
    var cbg=window._coStatus=="sale"?"#16a34a":window._coStatus=="callback"?"#d97706":"#dc2626";
    h+='<div style="display:flex;gap:8px;margin-top:14px;">';
    h+='<button onclick="confirmOut(\''+id+'\',window._coStatus)" style="flex:1;padding:14px;background:'+cbg+';border:none;border-radius:10px;color:white;font-weight:900;font-size:14px;">CONFIRM CHECK OUT</button>';
    h+='<button onclick="showLead(\''+id+'\')" style="padding:14px 16px;background:#374151;border:none;border-radius:10px;color:#9ca3af;font-size:16px;">X</button>';
    h+="</div></div>";
    document.getElementById("panel").innerHTML=h;
    window._ro=render;
  }
  render();
}

function confirmOut(id,status){
  var n=document.getElementById("mn")?document.getElementById("mn").value:"";
  leads=leads.map(function(l){return l.id==id?Object.assign({},l,{status:status,checkOutTime:new Date().toLocaleTimeString(),notes:n}):l;});
  save();
  var lead=leads.find(function(l){return l.id==id;});
  var idx=currentRoute.findIndex(function(r){return r.id==id;});
  addMarker(lead,idx>=0?idx:null);
  updateStats();updateNextStopBanner();
  // Auto advance to next stop if in route
  if(routeActive&&idx>=0&&idx<currentRoute.length-1){
    var next=currentRoute[idx+1];
    setTimeout(function(){showLead(next.id);},300);
  } else {closePanel();}
}

function reopenLead(id){
  leads=leads.map(function(l){return l.id==id?Object.assign({},l,{status:"pending",checkInTime:null,checkOutTime:null,notes:"",checkedInAt:null}):l;});
  save();
  var lead=leads.find(function(l){return l.id==id;});
  var idx=currentRoute.findIndex(function(r){return r.id==id;});
  addMarker(lead,idx>=0?idx:null);
  updateStats();updateNextStopBanner();closePanel();
}

function deleteLead(id){
  if(confirm("Remove this business?")){
    if(markers[id]){markers[id].setMap(null);delete markers[id];}
    leads=leads.filter(function(l){return l.id!=id;});
    currentRoute=currentRoute.filter(function(r){return r.id!=id;});
    save();updateStats();updateNextStopBanner();closePanel();
  }
}

function addToRoute(id,name,addr,type,lat,lng){
  var existing=leads.find(function(l){return l.id==id;});
  if(!existing){var lead={id:id,name:name,address:addr,type:type,lat:lat,lng:lng,status:"pending",checkInTime:null,checkOutTime:null,notes:"",checkedInAt:null};leads.push(lead);save();addMarker(lead,null);}
  updateStats();closePanel();
}

function addAndCheckIn(id,name,addr,type,lat,lng){
  var existing=leads.find(function(l){return l.id==id;});
  if(!existing){var lead={id:id,name:name,address:addr,type:type,lat:lat,lng:lng,status:"pending",checkInTime:null,checkOutTime:null,notes:"",checkedInAt:null};leads.push(lead);save();addMarker(lead,null);updateStats();}
  openIn(id);
}

function showList(){
  var sorted=leads.slice();
  if(myPos){sorted=sorted.map(function(l){return Object.assign({},l,{dist:hav(myPos.lat,myPos.lng,l.lat,l.lng)});});sorted.sort(function(a,b){return a.dist-b.dist;});}
  var h='<div class="overlay" onclick="closePanel()"></div><div class="sheet">';
  h+='<div style="font-size:17px;font-weight:700;margin-bottom:4px;">All Leads</div>';
  h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">';
  [["all","All"],["pending","Pending"],["sale","Sales"],["callback","Callbacks"]].forEach(function(f){
    h+='<button onclick="filterList(\''+f[0]+'\')" style="padding:3px 9px;border-radius:20px;border:none;font-size:10px;font-weight:700;background:#374151;color:#9ca3af;">'+f[1]+"</button>";
  });
  h+="</div>";
  if(!sorted.length)h+='<div style="text-align:center;padding:30px;color:#374151;">No leads yet. Tap Nearby or tap any business on the map.</div>';
  sorted.forEach(function(lead){
    var cfg=CFG[lead.status];
    h+='<div onclick="closePanel();showLead(\''+lead.id+'\')" style="display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #374151;cursor:pointer;gap:10px;">';
    h+='<div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+lead.name+"</div>";
    h+='<div style="font-size:9px;color:#9ca3af;">'+lead.address+"</div>";
    if(lead.dist!=null)h+='<div style="font-size:9px;color:#f59e0b;">'+fmt(lead.dist)+" away</div>";
    h+="</div>";
    h+='<div style="background:'+cfg.bg+';border-radius:20px;padding:2px 8px;flex-shrink:0;"><span style="font-size:9px;font-weight:700;color:'+cfg.color+';">'+cfg.label+"</span></div></div>";
  });
  h+="</div>";
  document.getElementById("panel").innerHTML=h;
}

function filterList(f){
  var sorted=f=="all"?leads.slice():leads.filter(function(l){return l.status==f;});
  if(myPos){sorted=sorted.map(function(l){return Object.assign({},l,{dist:hav(myPos.lat,myPos.lng,l.lat,l.lng)});});sorted.sort(function(a,b){return a.dist-b.dist;});}
  var h='<div class="overlay" onclick="closePanel()"></div><div class="sheet">';
  h+='<div style="font-size:15px;font-weight:700;margin-bottom:12px;">'+f.charAt(0).toUpperCase()+f.slice(1)+" ("+sorted.length+")</div>";
  sorted.forEach(function(lead){
    var cfg=CFG[lead.status];
    h+='<div onclick="closePanel();showLead(\''+lead.id+'\')" style="display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #374151;cursor:pointer;gap:10px;">';
    h+='<div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+lead.name+"</div><div style=\"font-size:9px;color:#9ca3af;\">"+lead.address+"</div>"+(lead.dist!=null?'<div style="font-size:9px;color:#f59e0b;">'+fmt(lead.dist)+" away</div>":"")+"</div>";
    h+='<div style="background:'+cfg.bg+';border-radius:20px;padding:2px 8px;flex-shrink:0;"><span style="font-size:9px;font-weight:700;color:'+cfg.color+';">'+cfg.label+"</span></div></div>";
  });
  h+="</div>";
  document.getElementById("panel").innerHTML=h;
}

function openAdd(){
  var h='<div class="overlay" onclick="closePanel()"></div><div class="sheet">';
  h+='<div style="font-size:16px;font-weight:700;margin-bottom:4px;">Add Business</div>';
  h+='<div style="font-size:10px;color:#9ca3af;margin-bottom:14px;">Manually add any walk-in lead</div>';
  h+='<span class="lbl">BUSINESS NAME</span><input id="nn" class="inp" placeholder="e.g. Fresh Cut Barbershop"/>';
  h+='<span class="lbl">ADDRESS</span><input id="na" class="inp" placeholder="e.g. 450 Jane St, Vaughan"/>';
  h+='<span class="lbl">TYPE</span><select id="nt" class="inp" style="margin-top:4px;">';
  BTYPES.forEach(function(t){h+="<option>"+t+"</option>";});
  h+="</select>";
  h+='<div style="display:flex;gap:8px;margin-top:16px;">';
  h+='<button onclick="confirmAdd()" style="flex:1;padding:13px;background:#16a34a;border:none;border-radius:10px;color:white;font-weight:900;font-size:13px;">ADD TO MAP</button>';
  h+='<button onclick="closePanel()" style="padding:13px 16px;background:#374151;border:none;border-radius:10px;color:#9ca3af;font-size:16px;">X</button>';
  h+="</div></div>";
  document.getElementById("panel").innerHTML=h;
}

function confirmAdd(){
  var n=document.getElementById("nn").value.trim(),a=document.getElementById("na").value.trim(),t=document.getElementById("nt").value;
  if(!n){alert("Please enter a business name.");return;}
  var geocoder=new google.maps.Geocoder();
  geocoder.geocode({address:(a?a+", ":"")+"Ontario, Canada"},function(results,status){
    var lat=myPos?myPos.lat+(Math.random()-.5)*.003:43.8361+(Math.random()-.5)*.02;
    var lng=myPos?myPos.lng+(Math.random()-.5)*.003:-79.4983+(Math.random()-.5)*.03;
    if(status=="OK"&&results[0]){lat=results[0].geometry.location.lat();lng=results[0].geometry.location.lng();}
    var lead={id:"m_"+Date.now(),name:n,address:a,type:t,lat:lat,lng:lng,status:"pending",checkInTime:null,checkOutTime:null,notes:"",checkedInAt:null};
    leads.push(lead);save();addMarker(lead,null);updateStats();
    gmap.setCenter({lat:lat,lng:lng});gmap.setZoom(16);closePanel();
  });
}

function doReset(){
  if(confirm("Reset all leads to Not Visited?")){
    leads=leads.map(function(l){return Object.assign({},l,{status:"pending",checkInTime:null,checkOutTime:null,notes:"",checkedInAt:null});});
    save();refreshMarkers();updateNextStopBanner();closePanel();
  }
}

function closePanel(){document.getElementById("panel").innerHTML="";}
</script>
