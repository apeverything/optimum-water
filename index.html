<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>OW Field Sales</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:monospace;background:#111827;color:#f9fafb;height:100vh;display:flex;flex-direction:column;overflow:hidden}
button{font-family:monospace;cursor:pointer}
input,select,textarea{font-family:monospace}
#map{flex:1;z-index:1}
.hdr{background:#1f2937;border-bottom:2px solid #374151;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;z-index:1000;position:relative;flex-shrink:0}
.statbar{background:#1a2332;border-bottom:1px solid #374151;padding:6px 14px;display:flex;gap:14px;align-items:center;overflow-x:auto;z-index:1000;position:relative;flex-shrink:0}
.sheet{position:fixed;bottom:0;left:0;right:0;background:#1f2937;border-top:2px solid #2563eb;border-radius:16px 16px 0 0;padding:18px 16px 30px;z-index:2000;animation:up .22s ease;max-height:85vh;overflow-y:auto}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:9px;height:9px;border:2px solid #60a5fa;border-top-color:transparent;border-radius:50%;display:inline-block;animation:spin .7s linear infinite;vertical-align:middle}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1999}
.inp{width:100%;background:#111827;border:1px solid #374151;border-radius:8px;color:#f9fafb;font-size:13px;padding:10px;outline:none;font-family:monospace;margin-top:4px}
.lbl{font-size:9px;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em;margin-top:12px;display:block}
.navbtn{padding:5px 9px;border-radius:6px;border:none;font-size:11px;font-weight:700}
</style>
</head>
<body>

<div class="hdr">
  <div style="display:flex;align-items:center;gap:8px;">
    <div style="width:30px;height:30px;background:#2563eb;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;color:white;flex-shrink:0;">OW</div>
    <div>
      <div style="font-size:13px;font-weight:700;">OPTIMUM WATER</div>
      <div style="font-size:8px;color:#9ca3af;letter-spacing:.1em;">FIELD SALES TRACKER</div>
    </div>
  </div>
  <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;">
    <button id="gpsBtn" onclick="toggleGps()" class="navbtn" style="background:#374151;color:#9ca3af;">GPS</button>
    <button onclick="searchNearby()" class="navbtn" style="background:#374151;color:#9ca3af;">Nearby</button>
    <button onclick="showList()" class="navbtn" style="background:#374151;color:#9ca3af;">List</button>
    <button onclick="openAdd()" class="navbtn" style="background:#2563eb;color:white;">+ Add</button>
  </div>
</div>

<div class="statbar">
  <div style="display:flex;align-items:baseline;gap:4px;white-space:nowrap;"><span style="font-size:9px;color:#6b7280;text-transform:uppercase;">Leads</span><span id="st-total" style="font-size:17px;font-weight:900;color:#9ca3af;">0</span></div>
  <div style="display:flex;align-items:baseline;gap:4px;white-space:nowrap;"><span style="font-size:9px;color:#6b7280;text-transform:uppercase;">Visited</span><span id="st-visited" style="font-size:17px;font-weight:900;color:#60a5fa;">0</span></div>
  <div style="display:flex;align-items:baseline;gap:4px;white-space:nowrap;"><span style="font-size:9px;color:#6b7280;text-transform:uppercase;">Sales</span><span id="st-sales" style="font-size:17px;font-weight:900;color:#4ade80;">0</span></div>
  <div style="display:flex;align-items:baseline;gap:4px;white-space:nowrap;"><span style="font-size:9px;color:#6b7280;text-transform:uppercase;">Conv</span><span id="st-conv" style="font-size:17px;font-weight:900;color:#fbbf24;">0%</span></div>
  <button onclick="doReset()" style="margin-left:auto;padding:5px 9px;background:transparent;border:1px solid #374151;border-radius:6px;color:#6b7280;font-size:11px;flex-shrink:0;">Reset</button>
</div>

<div id="map"></div>
<div id="panel"></div>

<script>
var CFG={pending:{label:"Not Visited",color:"#6b7280",bg:"#374151",dot:"#9ca3af"},checked_in:{label:"Checked In",color:"#60a5fa",bg:"#1e3a5f",dot:"#3b82f6"},not_interested:{label:"Not Interested",color:"#f87171",bg:"#450a0a",dot:"#ef4444"},sale:{label:"SALE!",color:"#4ade80",bg:"#052e16",dot:"#16a34a"},callback:{label:"Call Back",color:"#fbbf24",bg:"#451a03",dot:"#f59e0b"},no_answer:{label:"No Answer",color:"#c084fc",bg:"#2e1065",dot:"#a855f7"}};
var BTYPES=["Restaurant","Medical","Laundry","Spa/Wellness","Auto","Bakery","Retail","Office","Gym","Hotel","Other"];
var TYPE_MAP={"restaurant":"Restaurant","food":"Restaurant","meal_takeaway":"Restaurant","cafe":"Restaurant","doctor":"Medical","dentist":"Medical","hospital":"Medical","physiotherapist":"Medical","pharmacy":"Medical","laundry":"Laundry","car_wash":"Auto","car_dealer":"Auto","car_repair":"Auto","bakery":"Bakery","beauty_salon":"Spa/Wellness","spa":"Spa/Wellness","gym":"Gym","lodging":"Hotel"};

var leads=[];
try{var sv=localStorage.getItem("ow9");if(sv)leads=JSON.parse(sv);}catch(e){}
function save(){try{localStorage.setItem("ow9",JSON.stringify(leads));}catch(e){}}
function hav(a,b,c,d){var R=6371,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180,p=Math.sin(x/2)*Math.sin(x/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)*Math.sin(y/2);return R*2*Math.atan2(Math.sqrt(p),Math.sqrt(1-p));}
function fmt(k){return k<1?Math.round(k*1000)+"m":k.toFixed(1)+"km";}

var gmap,gpsMarker,watchId,myPos=null,gpsOn=false;
var markers={};
var placesService,infoWindow;

function initMap(){
  gmap=new google.maps.Map(document.getElementById("map"),{
    center:{lat:43.8361,lng:-79.4983},
    zoom:13,
    clickableIcons:true,
    styles:[
      {elementType:"geometry",stylers:[{color:"#1d2c4d"}]},
      {elementType:"labels.text.fill",stylers:[{color:"#8ec3b9"}]},
      {elementType:"labels.text.stroke",stylers:[{color:"#1a3646"}]},
      {featureType:"road",elementType:"geometry",stylers:[{color:"#304a7d"}]},
      {featureType:"road",elementType:"labels.text.fill",stylers:[{color:"#98a5be"}]},
      {featureType:"water",elementType:"geometry",stylers:[{color:"#0e1626"}]},
      {featureType:"poi",elementType:"geometry",stylers:[{color:"#283d6a"}]},
      {featureType:"transit",elementType:"geometry",stylers:[{color:"#2f3948"}]}
    ],
    mapTypeControl:false,streetViewControl:false,fullscreenControl:false
  });
  // Intercept native Google POI clicks and open check-in sheet
  gmap.addListener("click",function(e){
    if(e.placeId){
      e.stop();
      var req={placeId:e.placeId,fields:["name","vicinity","geometry","types","rating"]};
      placesService.getDetails(req,function(place,status){
        if(status==google.maps.places.PlacesServiceStatus.OK){
          // Check if already in leads
          var existing=leads.find(function(l){return l.id==e.placeId;});
          if(existing){showLead(existing.id);return;}
          // Show quick add/checkin panel
          var t="Other";
          if(place.types){place.types.forEach(function(pt){if(TYPE_MAP[pt]&&t=="Other")t=TYPE_MAP[pt];});}
          var h='<div class="overlay" onclick="closePanel()"></div><div class="sheet">';
          h+='<div style="font-size:9px;color:#9ca3af;text-transform:uppercase;letter-spacing:.1em;">BUSINESS FOUND</div>';
          h+='<div style="font-size:18px;font-weight:700;margin:4px 0 2px;">'+place.name+"</div>";
          h+='<div style="font-size:10px;color:#9ca3af;margin-top:2px;">'+(place.vicinity||"")+" &middot; "+t+"</div>";
          if(place.rating)h+='<div style="font-size:10px;color:#fbbf24;margin-top:2px;">&#9733; '+place.rating+" Google rating</div>";
          h+='<div style="font-size:11px;color:#6b7280;margin-top:8px;margin-bottom:14px;">Add this business to your route and check in?</div>';
          h+='<div style="display:flex;gap:8px;">';
          h+='<button onclick="addAndCheckIn(\''+e.placeId+'\',\''+place.name.replace(/'/g,"").replace(/"/g,"")+'\',\''+(place.vicinity||"").replace(/'/g,"").replace(/"/g,"")+'\',\''+t+'\','+place.geometry.location.lat()+','+place.geometry.location.lng()+')" style="flex:1;padding:12px;background:#2563eb;border:none;border-radius:8px;color:white;font-weight:800;font-size:13px;">ADD + CHECK IN</button>';
          h+='<button onclick="addToRoute(\''+e.placeId+'\',\''+place.name.replace(/'/g,"").replace(/"/g,"")+'\',\''+(place.vicinity||"").replace(/'/g,"").replace(/"/g,"")+'\',\''+t+'\','+place.geometry.location.lat()+','+place.geometry.location.lng()+')" style="flex:1;padding:12px;background:#374151;border:none;border-radius:8px;color:#9ca3af;font-size:12px;">Add to Route</button>';
          h+='<button onclick="closePanel()" style="padding:12px 14px;background:#374151;border:none;border-radius:8px;color:#9ca3af;font-size:16px;">X</button>';
          h+="</div></div>";
          document.getElementById("panel").innerHTML=h;
        }
      });
    }
  });
  placesService=new google.maps.places.PlacesService(gmap);
  infoWindow=new google.maps.InfoWindow();
  refreshMarkers();
}

function getMarkerIcon(status){
  var colors={pending:"#9ca3af",checked_in:"#3b82f6",not_interested:"#ef4444",sale:"#16a34a",callback:"#f59e0b",no_answer:"#a855f7"};
  var c=colors[status]||"#9ca3af";
  var size=status=="sale"?20:14;
  return {
    path:google.maps.SymbolPath.CIRCLE,
    fillColor:c,fillOpacity:1,
    strokeColor:"white",strokeWeight:2,
    scale:size/2
  };
}

function addMarker(lead){
  if(markers[lead.id]){markers[lead.id].setMap(null);}
  var m=new google.maps.Marker({
    position:{lat:lead.lat,lng:lead.lng},
    map:gmap,
    icon:getMarkerIcon(lead.status),
    title:lead.name,
    zIndex:lead.status=="sale"?100:1
  });
  m.addListener("click",function(){showLead(lead.id);});
  markers[lead.id]=m;
}

function refreshMarkers(){
  leads.forEach(addMarker);
  updateStats();
}

function updateStats(){
  var v=leads.filter(function(l){return l.status!="pending";}).length;
  var s=leads.filter(function(l){return l.status=="sale";}).length;
  document.getElementById("st-total").textContent=leads.length;
  document.getElementById("st-visited").textContent=v;
  document.getElementById("st-sales").textContent=s;
  document.getElementById("st-conv").textContent=(v>0?Math.round(s/v*100):0)+"%";
}

function toggleGps(){
  if(gpsOn){
    if(watchId)navigator.geolocation.clearWatch(watchId);
    if(gpsMarker)gpsMarker.setMap(null);
    gpsMarker=null;myPos=null;gpsOn=false;
    document.getElementById("gpsBtn").style.background="#374151";
    document.getElementById("gpsBtn").style.color="#9ca3af";
    document.getElementById("gpsBtn").textContent="GPS";
  } else {
    if(!navigator.geolocation){alert("GPS not available");return;}
    document.getElementById("gpsBtn").innerHTML='<span class="spinner"></span> Locating...';
    watchId=navigator.geolocation.watchPosition(function(pos){
      myPos={lat:pos.coords.latitude,lng:pos.coords.longitude};
      if(!gpsOn){
        gpsOn=true;
        document.getElementById("gpsBtn").style.background="#2563eb";
        document.getElementById("gpsBtn").style.color="white";
        document.getElementById("gpsBtn").textContent="GPS ON";
        gmap.setCenter(myPos);gmap.setZoom(15);
      }
      if(!gpsMarker){
        gpsMarker=new google.maps.Marker({
          position:myPos,map:gmap,
          icon:{path:google.maps.SymbolPath.CIRCLE,fillColor:"#60a5fa",fillOpacity:1,strokeColor:"white",strokeWeight:3,scale:8},
          title:"You are here",zIndex:1000
        });
      } else {
        gpsMarker.setPosition(myPos);
      }
    },function(e){
      document.getElementById("gpsBtn").textContent="GPS";
      alert(e.code==1?"Location permission denied.":"GPS error.");
    },{enableHighAccuracy:true,maximumAge:5000,timeout:15000});
  }
}

function searchNearby(){
  var center=myPos||{lat:43.8361,lng:-79.4983};
  var types=[["restaurant"],["health"],["laundry"],["car_wash"],["bakery"],["spa"],["gym"],["car_dealer"]];
  var total=0;
  var done=0;
  document.getElementById("panel").innerHTML='<div class="overlay"></div><div class="sheet"><div style="text-align:center;padding:20px;"><div class="spinner" style="width:24px;height:24px;border-width:3px;display:inline-block;"></div><br><br><div style="font-size:14px;margin-top:10px;">Searching nearby businesses...</div><div style="font-size:10px;color:#9ca3af;margin-top:6px;">This may take a few seconds</div></div></div>';
  
  function search(typeArr){
    var req={location:new google.maps.LatLng(center.lat,center.lng),radius:20000,type:typeArr};
    placesService.nearbySearch(req,function(results,status){
      done++;
      if(status==google.maps.places.PlacesServiceStatus.OK&&results){
        results.forEach(function(place){
          var exists=leads.find(function(l){return l.id==place.place_id;});
          if(exists)return;
          var t="Other";
          if(place.types){place.types.forEach(function(pt){if(TYPE_MAP[pt]&&t=="Other")t=TYPE_MAP[pt];});}
          var lead={
            id:place.place_id,
            name:place.name,
            address:place.vicinity||"",
            type:t,
            lat:place.geometry.location.lat(),
            lng:place.geometry.location.lng(),
            rating:place.rating,
            status:"pending",checkInTime:null,checkOutTime:null,notes:"",checkedInAt:null
          };
          leads.push(lead);total++;
        });
      }
      if(done==types.length){
        save();refreshMarkers();closePanel();
        gmap.setCenter(center);gmap.setZoom(13);
        alert("Found "+total+" businesses near you! Tap any marker on the map to check in.");
      }
    });
  }
  types.forEach(search);
}

function showLead(id){
  var lead=leads.find(function(l){return l.id==id;});
  if(!lead)return;
  var cfg=CFG[lead.status];
  var dist=myPos?hav(myPos.lat,myPos.lng,lead.lat,lead.lng):null;
  var h='<div class="overlay" onclick="closePanel()"></div><div class="sheet">';
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">';
  h+='<div style="flex:1;min-width:0;"><div style="font-size:17px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+lead.name+"</div>";
  h+='<div style="font-size:10px;color:#9ca3af;margin-top:2px;">'+lead.address+(lead.type?" &middot; "+lead.type:"")+"</div>";
  if(lead.rating)h+='<div style="font-size:10px;color:#fbbf24;margin-top:2px;">&#9733; '+lead.rating+" Google rating</div>";
  if(dist!=null)h+='<div style="font-size:11px;color:#f59e0b;margin-top:3px;">'+fmt(dist)+" away</div>";
  if(lead.checkInTime)h+='<div style="font-size:9px;color:#6b7280;margin-top:2px;">In: '+lead.checkInTime+(lead.checkOutTime?" &middot; Out: "+lead.checkOutTime:"")+"</div>";
  h+="</div>";
  h+='<div style="background:'+cfg.bg+';border-radius:20px;padding:3px 9px;display:flex;align-items:center;gap:4px;margin-left:10px;flex-shrink:0;">';
  h+='<span style="width:6px;height:6px;border-radius:50%;background:'+cfg.dot+';display:inline-block;"></span>';
  h+='<span style="font-size:9px;font-weight:700;color:'+cfg.color+';">'+cfg.label+"</span></div></div>";
  if(lead.notes)h+='<div style="font-size:11px;color:#9ca3af;margin-bottom:12px;font-style:italic;padding:8px;background:#111827;border-radius:6px;">'+lead.notes+"</div>";
  h+='<div style="display:flex;gap:8px;flex-wrap:wrap;">';
  if(lead.status=="pending")h+='<button onclick="openIn(\''+id+'\')" style="flex:1;min-width:120px;padding:12px;background:#2563eb;border:none;border-radius:8px;color:white;font-weight:800;font-size:13px;">CHECK IN</button>';
  if(lead.status=="checked_in")h+='<button onclick="openOut(\''+id+'\')" style="flex:1;min-width:120px;padding:12px;background:#d97706;border:none;border-radius:8px;color:black;font-weight:800;font-size:13px;">CHECK OUT</button>';
  if(["not_interested","no_answer","callback","sale"].indexOf(lead.status)>=0)h+='<button onclick="reopenLead(\''+id+'\')" style="flex:1;min-width:100px;padding:12px;background:#374151;border:none;border-radius:8px;color:#9ca3af;font-size:12px;">Re-visit</button>';
  h+='<button onclick="deleteLead(\''+id+'\')" style="padding:12px 14px;background:#450a0a;border:none;border-radius:8px;color:#f87171;font-size:13px;">Del</button>';
  h+='<button onclick="closePanel()" style="padding:12px 14px;background:#374151;border:none;border-radius:8px;color:#9ca3af;font-size:16px;">X</button>';
  h+="</div></div>";
  document.getElementById("panel").innerHTML=h;
  if(gmap)gmap.panTo({lat:lead.lat,lng:lead.lng});
}

function showList(){
  var sorted=leads.slice();
  if(myPos){sorted=sorted.map(function(l){return Object.assign({},l,{dist:hav(myPos.lat,myPos.lng,l.lat,l.lng)});});sorted.sort(function(a,b){return a.dist-b.dist;});}
  var h='<div class="overlay" onclick="closePanel()"></div><div class="sheet">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">';
  h+='<div style="font-size:15px;font-weight:700;">Leads ('+leads.length+")</div>";
  h+='<div style="display:flex;gap:6px;">';
  ["all","pending","checked_in","sale","callback"].forEach(function(f){
    var labels={all:"All",pending:"New",checked_in:"Active",sale:"Sales",callback:"Follow-up"};
    h+='<button onclick="filterList(\''+f+'\')" style="padding:3px 8px;border-radius:20px;border:none;font-size:9px;font-weight:700;background:#374151;color:#9ca3af;">'+labels[f]+"</button>";
  });
  h+="</div></div>";
  if(!sorted.length)h+='<div style="text-align:center;padding:30px;color:#374151;font-size:12px;">No leads yet.<br>Tap Nearby to load businesses.</div>';
  sorted.forEach(function(lead){
    var cfg=CFG[lead.status];
    h+='<div onclick="closePanel();showLead(\''+lead.id+'\')" style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #374151;cursor:pointer;">';
    h+='<div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+lead.name+"</div>";
    h+='<div style="font-size:9px;color:#9ca3af;">'+lead.address+"</div>";
    if(lead.dist!=null)h+='<div style="font-size:9px;color:#f59e0b;">'+fmt(lead.dist)+" away</div>";
    h+="</div>";
    h+='<div style="background:'+cfg.bg+';border-radius:20px;padding:2px 7px;margin-left:8px;flex-shrink:0;"><span style="font-size:8px;font-weight:700;color:'+cfg.color+';">'+cfg.label+"</span></div>";
    h+="</div>";
  });
  h+="</div>";
  document.getElementById("panel").innerHTML=h;
}

function filterList(f){
  var sorted=leads.slice();
  if(f!="all")sorted=sorted.filter(function(l){return l.status==f;});
  if(myPos){sorted=sorted.map(function(l){return Object.assign({},l,{dist:hav(myPos.lat,myPos.lng,l.lat,l.lng)});});sorted.sort(function(a,b){return a.dist-b.dist;});}
  var h='<div class="overlay" onclick="closePanel()"></div><div class="sheet">';
  h+='<div style="font-size:15px;font-weight:700;margin-bottom:12px;">'+f.charAt(0).toUpperCase()+f.slice(1).replace("_"," ")+" ("+sorted.length+")</div>";
  sorted.forEach(function(lead){
    var cfg=CFG[lead.status];
    h+='<div onclick="closePanel();showLead(\''+lead.id+'\')" style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #374151;cursor:pointer;">';
    h+='<div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+lead.name+"</div>";
    h+='<div style="font-size:9px;color:#9ca3af;">'+lead.address+"</div>";
    if(lead.dist!=null)h+='<div style="font-size:9px;color:#f59e0b;">'+fmt(lead.dist)+" away</div>";
    h+="</div>";
    h+='<div style="background:'+cfg.bg+';border-radius:20px;padding:2px 7px;margin-left:8px;flex-shrink:0;"><span style="font-size:8px;font-weight:700;color:'+cfg.color+';">'+cfg.label+"</span></div>";
    h+="</div>";
  });
  h+="</div>";
  document.getElementById("panel").innerHTML=h;
}

function openIn(id){
  var lead=leads.find(function(l){return l.id==id;});
  if(!lead)return;
  var h='<div class="overlay"></div><div class="sheet">';
  h+='<div style="font-size:9px;color:#9ca3af;text-transform:uppercase;letter-spacing:.1em;">CHECKING IN AT</div>';
  h+='<div style="font-size:18px;font-weight:700;margin:4px 0 2px;">'+lead.name+"</div>";
  h+='<div style="font-size:10px;color:#9ca3af;margin-bottom:4px;">'+lead.address+"</div>";
  h+='<span class="lbl">NOTES</span>';
  h+='<textarea id="mn" class="inp" placeholder="Owner present, showed interest in taste test..." style="resize:none;height:80px;margin-top:4px;"></textarea>';

h+=’<div style="display:flex;gap:8px;margin-top:14px;">’;
h+=’<button onclick="confirmIn(\''+id+'\')" style="flex:1;padding:13px;background:#2563eb;border:none;border-radius:10px;color:white;font-weight:900;font-size:13px;">CONFIRM CHECK IN</button>’;
h+=’<button onclick="closePanel()" style="padding:13px 16px;background:#374151;border:none;border-radius:10px;color:#9ca3af;font-size:16px;">X</button>’;
h+=”</div></div>”;
document.getElementById(“panel”).innerHTML=h;
}

function confirmIn(id){
var n=document.getElementById(“mn”)?document.getElementById(“mn”).value:””;
leads=leads.map(function(l){return l.id==id?Object.assign({},l,{status:“checked_in”,checkInTime:new Date().toLocaleTimeString(),checkedInAt:Date.now(),notes:n}):l;});
save();
var lead=leads.find(function(l){return l.id==id;});
if(lead)addMarker(lead);
updateStats();closePanel();
}

function openOut(id){
var lead=leads.find(function(l){return l.id==id;});
if(!lead)return;
window._coStatus=“not_interested”;
function render(){
var h=’<div class="overlay"></div><div class="sheet">’;
h+=’<div style="font-size:9px;color:#9ca3af;text-transform:uppercase;letter-spacing:.1em;">CHECKING OUT OF</div>’;
h+=’<div style="font-size:18px;font-weight:700;margin:4px 0 2px;">’+lead.name+”</div>”;
h+=’<div style="font-size:10px;color:#9ca3af;margin-bottom:12px;">’+lead.address+”</div>”;
h+=’<span class="lbl">OUTCOME</span>’;
h+=’<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:4px;">’;
[“sale”,“not_interested”,“callback”,“no_answer”].forEach(function(s){
var c=CFG[s],sel=window._coStatus==s;
h+=’<button onclick=“window._coStatus='’+s+’';window._renderOut()” style=“padding:11px 7px;border-radius:8px;font-size:11px;font-weight:700;border:2px solid ‘+(sel?c.dot:”#374151”)+’;background:’+(sel?c.bg:”#111827”)+’;color:’+(sel?c.color:”#6b7280”)+’;”>’+c.label+”</button>”;
});
h+=”</div>”;
h+=’<span class="lbl">NOTES</span>’;
h+=’<textarea id="mn" class="inp" placeholder="Left brochure, will follow up..." style="resize:none;height:70px;margin-top:4px;">’+lead.notes+”</textarea>”;
var cbg=window._coStatus==“sale”?”#16a34a”:window._coStatus==“callback”?”#d97706”:”#dc2626”;
h+=’<div style="display:flex;gap:8px;margin-top:14px;">’;
h+=’<button onclick="confirmOut(\''+id+'\',window._coStatus)" style="flex:1;padding:13px;background:'+cbg+';border:none;border-radius:10px;color:white;font-weight:900;font-size:13px;">CONFIRM CHECK OUT</button>’;
h+=’<button onclick="closePanel()" style="padding:13px 16px;background:#374151;border:none;border-radius:10px;color:#9ca3af;font-size:16px;">X</button>’;
h+=”</div></div>”;
document.getElementById(“panel”).innerHTML=h;
window._renderOut=render;
}
render();
}

function confirmOut(id,status){
var n=document.getElementById(“mn”)?document.getElementById(“mn”).value:””;
leads=leads.map(function(l){return l.id==id?Object.assign({},l,{status:status,checkOutTime:new Date().toLocaleTimeString(),notes:n}):l;});
save();
var lead=leads.find(function(l){return l.id==id;});
if(lead)addMarker(lead);
updateStats();closePanel();
}

function reopenLead(id){
leads=leads.map(function(l){return l.id==id?Object.assign({},l,{status:“pending”,checkInTime:null,checkOutTime:null,notes:””,checkedInAt:null}):l;});
save();
var lead=leads.find(function(l){return l.id==id;});
if(lead)addMarker(lead);
updateStats();closePanel();
}

function deleteLead(id){
if(confirm(“Remove this business?”)){
if(markers[id]){markers[id].setMap(null);delete markers[id];}
leads=leads.filter(function(l){return l.id!=id;});
save();updateStats();closePanel();
}
}

function openAdd(){
var h=’<div class="overlay" onclick="closePanel()"></div><div class="sheet">’;
h+=’<div style="font-size:15px;font-weight:700;margin-bottom:4px;">Add Business</div>’;
h+=’<div style="font-size:10px;color:#9ca3af;margin-bottom:14px;">Manually add a walk-in lead</div>’;
h+=’<span class="lbl">BUSINESS NAME</span><input id="nn" class="inp" placeholder="e.g. Fresh Cut Barbershop"/>’;
h+=’<span class="lbl">ADDRESS</span><input id="na" class="inp" placeholder="e.g. 450 Jane St, Vaughan"/>’;
h+=’<span class="lbl">TYPE</span><select id="nt" class="inp" style="margin-top:4px;">’;
BTYPES.forEach(function(t){h+=”<option>”+t+”</option>”;});
h+=”</select>”;
h+=’<div style="display:flex;gap:8px;margin-top:16px;">’;
h+=’<button onclick="confirmAdd()" style="flex:1;padding:13px;background:#16a34a;border:none;border-radius:10px;color:white;font-weight:900;font-size:13px;">ADD TO MAP</button>’;
h+=’<button onclick="closePanel()" style="padding:13px 16px;background:#374151;border:none;border-radius:10px;color:#9ca3af;font-size:16px;">X</button>’;
h+=”</div></div>”;
document.getElementById(“panel”).innerHTML=h;
}

function confirmAdd(){
var n=document.getElementById(“nn”).value.trim();
var a=document.getElementById(“na”).value.trim();
var t=document.getElementById(“nt”).value;
if(!n){alert(“Please enter a business name.”);return;}
var geocoder=new google.maps.Geocoder();
var addr=a?a+”, Ontario, Canada”:“Vaughan, Ontario, Canada”;
geocoder.geocode({address:addr},function(results,status){
var lat,lng;
if(status==“OK”&&results[0]){
lat=results[0].geometry.location.lat();
lng=results[0].geometry.location.lng();
} else {
lat=myPos?myPos.lat+(Math.random()-.5)*.003:43.8361+(Math.random()-.5)*.02;
lng=myPos?myPos.lng+(Math.random()-.5)*.003:-79.4983+(Math.random()-.5)*.03;
}
var lead={id:“manual_”+Date.now(),name:n,address:a,type:t,lat:lat,lng:lng,status:“pending”,checkInTime:null,checkOutTime:null,notes:””,checkedInAt:null};
leads.push(lead);save();addMarker(lead);updateStats();
gmap.setCenter({lat:lat,lng:lng});gmap.setZoom(16);
closePanel();
});
}

function doReset(){
if(confirm(“Reset all leads to Not Visited?”)){
leads=leads.map(function(l){return Object.assign({},l,{status:“pending”,checkInTime:null,checkOutTime:null,notes:””,checkedInAt:null});});
save();refreshMarkers();closePanel();
}
}

function addToRoute(id,name,addr,type,lat,lng){var existing=leads.find(function(l){return l.id==id;});if(existing){showLead(id);return;}var lead={id:id,name:name,address:addr,type:type,lat:lat,lng:lng,status:“pending”,checkInTime:null,checkOutTime:null,notes:””,checkedInAt:null};leads.push(lead);save();addMarker(lead);updateStats();showLead(id);}
function addAndCheckIn(id,name,addr,type,lat,lng){var existing=leads.find(function(l){return l.id==id;});if(!existing){var lead={id:id,name:name,address:addr,type:type,lat:lat,lng:lng,status:“pending”,checkInTime:null,checkOutTime:null,notes:””,checkedInAt:null};leads.push(lead);save();addMarker(lead);updateStats();}openIn(id);}
function closePanel(){document.getElementById(“panel”).innerHTML=””;}
</script>
